version: "2"
sql:
  - schema: "internal/data/db/migrations/sql" # Path to your migrations
    queries: "internal/data/db/queries" # Path to your query files
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "internal/data/db/generated" # Where the code will land
        emit_json_tags: true
        emit_prepared_queries: false
